<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LEARNIX PLAYER | Auto-Sign ALL Segments</title>
    <link rel="icon" href="https://i.supaimg.com/5aa6f3e6-1291-4b63-879e-7870fcdac1d6.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00E0A1;
            --primary-dark: #00B884;
            --primary-glow: 0 0 12px rgba(0,224,161,0.6);
            --bg-dark: #0A1128;
            --bg-darker: #050A1D;
            --bg-card: #131C3F;
            --text-light: #FFFFFF;
            --text-muted: #A0AEC0;
            --border-light: rgba(0,224,161,0.3);
            --radius: 18px;
            --shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, var(--bg-darker), var(--bg-dark));
            color: var(--text-light);
            min-height: 100vh;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 20px;
        }
        .logo-area { display: flex; align-items: center; gap: 14px; }
        .logo { height: 52px; filter: drop-shadow(0 0 6px var(--primary)); }
        .logo-text { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--primary), #6C63FF); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header-actions { display: flex; gap: 12px; }
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            transition: all 0.25s ease;
        }
        .btn-icon { width: 46px; height: 46px; padding: 0; justify-content: center; border-radius: 50%; }
        .btn-primary { background: var(--primary); color: #0A1128; box-shadow: var(--primary-glow); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-secondary { background: rgba(0,224,161,0.12); border: 1px solid var(--border-light); color: white; backdrop-filter: blur(4px); }
        .btn-secondary:hover { background: rgba(0,224,161,0.25); border-color: var(--primary); }
        .player-card {
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
            margin-bottom: 28px;
        }
        .video-js {
            width: 100% !important;
            aspect-ratio: 16 / 9;
            border-radius: 24px;
            overflow: hidden;
        }
        .vjs-big-play-button {
            background: rgba(0,224,161,0.85) !important;
            border-radius: 50% !important;
            width: 70px !important;
            height: 70px !important;
            line-height: 70px !important;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background: var(--bg-card);
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid var(--border-light);
            margin-top: 20px;
        }
        .input-group i { font-size: 1.3rem; color: var(--primary); }
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 0.9rem;
            padding: 12px 0;
            outline: none;
            font-family: monospace;
        }
        .action-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 20px; justify-content: center; }
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin: 40px 0;
        }
        .resource-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 24px;
            border-top: 3px solid var(--primary);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            z-index: 9999;
            display: none;
            border-left: 4px solid var(--primary);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .modal-card {
            background: var(--bg-card);
            max-width: 450px;
            width: 90%;
            padding: 32px;
            border-radius: 32px;
            border: 1px solid var(--primary);
            text-align: center;
        }
        .password-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-light);
            padding: 14px;
            border-radius: 60px;
            width: 100%;
            color: white;
            margin: 20px 0;
        }
        .stats {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 15px;
            margin-top: 15px;
            font-size: 12px;
            font-family: monospace;
            text-align: center;
            border: 1px solid var(--border-light);
        }
        .secure-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #0f172ad9;
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 12px;
            border: 1px solid var(--primary);
            z-index: 99;
        }
        @media (max-width: 680px) {
            .container { padding: 16px; }
            .input-group { border-radius: 28px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <img src="https://i.postimg.cc/T2psP7QG/73f6e3b1-211e-4b7e-9eac-9881f90bc471.png" class="logo" alt="logo">
            <div class="logo-text">LEARNIX PLAYER · AUTO-SIGN ALL SEGMENTS</div>
        </div>
        <div class="header-actions">
            <button class="btn btn-icon btn-secondary" id="editLockBtn"><i class="fas fa-lock"></i></button>
            <button class="btn btn-icon btn-secondary" id="shareBtn"><i class="fas fa-share-alt"></i></button>
        </div>
    </header>

    <div class="player-card">
        <div id="playerContainer">
            <video id="streamPlayer" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        </div>
        
        <div class="input-group">
            <i class="fas fa-link"></i>
            <input type="text" id="videoUrlInput" class="input-field" placeholder="Enter FULL signed M3U8 URL (with Signature, Key-Pair-Id, Policy)">
            <button class="btn btn-primary" id="loadStreamBtn"><i class="fas fa-play"></i> Play</button>
        </div>
        
        <div class="resource-grid">
            <div class="resource-card">
                <i class="fas fa-file-alt" style="color: var(--primary); font-size: 1.8rem;"></i>
                <h4 style="margin: 12px 0 8px;">Notes</h4>
                <input type="text" id="notesUrl" class="input-field" placeholder="PDF / Doc URL" style="width:100%; margin-bottom:12px; padding:10px; background:rgba(0,0,0,0.3); border-radius:40px;">
                <button class="btn btn-secondary" id="viewNotesBtn" style="width: 100%;"><i class="fas fa-external-link-alt"></i> View Notes</button>
            </div>
            <div class="resource-card">
                <i class="fas fa-tasks" style="color: var(--primary); font-size: 1.8rem;"></i>
                <h4 style="margin: 12px 0 8px;">DPP (Practice)</h4>
                <input type="text" id="dppUrl" class="input-field" placeholder="DPP URL" style="width:100%; margin-bottom:12px; padding:10px; background:rgba(0,0,0,0.3); border-radius:40px;">
                <button class="btn btn-secondary" id="viewDppBtn" style="width: 100%;"><i class="fas fa-book"></i> Open DPP</button>
            </div>
        </div>
        
        <div class="action-row">
            <button class="btn btn-secondary" id="saveSessionBtn"><i class="fas fa-save"></i> Save Session</button>
            <button class="btn btn-secondary" id="exportLinksBtn"><i class="fas fa-share-alt"></i> Export Links</button>
            <button class="btn btn-primary" id="resetPlayerBtn"><i class="fas fa-trash-alt"></i> Reset</button>
        </div>
        
        <div class="stats" id="statsPanel">
            🔐 Ready - Paste your signed M3U8 URL above
        </div>
    </div>
</div>

<div class="secure-indicator" id="editModeIndicator" style="display: none;"><i class="fas fa-unlock-alt"></i> ✦ Edit Mode Active ✦</div>
<div class="toast" id="toastMsg"></div>

<!-- Password Modal -->
<div id="passwordModal" class="modal">
    <div class="modal-card">
        <i class="fas fa-lock" style="font-size: 48px; color: var(--primary); margin-bottom: 16px;"></i>
        <h2>Admin Unlock</h2>
        <p>Enter password to edit URLs</p>
        <input type="password" id="adminPass" class="password-input" placeholder="Password">
        <div style="display: flex; gap: 12px; margin-top: 10px;">
            <button class="btn btn-primary" id="submitPassBtn">Unlock</button>
            <button class="btn btn-secondary" id="closePassBtn">Cancel</button>
        </div>
        <p style="margin-top: 15px; font-size: 12px;">Default: murlikumar65@</p>
    </div>
</div>

<!-- Share Modal -->
<div id="shareModal" class="modal">
    <div class="modal-card">
        <h3><i class="fas fa-share-alt"></i> Share Session</h3>
        <div class="input-group" style="margin: 20px 0; background: #00000040;">
            <input type="text" id="shareLinkInput" readonly class="input-field">
            <button class="btn btn-primary" id="copyShareBtn"><i class="fas fa-copy"></i> Copy</button>
        </div>
        <button class="btn btn-secondary" id="closeShareModal">Close</button>
    </div>
</div>

<script>
    let player = null;
    let isEditMode = false;
    const CORRECT_PASSWORD = "murlikumar65@";
    
    // Store CloudFront auth components
    let cloudfrontAuth = {
        signature: '',
        keyPairId: '',
        policy: '',
        domain: ''
    };
    
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.display = 'block';
        toast.style.background = isError ? '#b91c1cd9' : '#0f172ad9';
        setTimeout(() => { toast.style.display = 'none'; }, 3500);
    }
    
    function updateStats(message, isError = false) {
        const stats = document.getElementById('statsPanel');
        stats.innerHTML = message;
        stats.style.borderLeftColor = isError ? '#ff4444' : 'var(--primary)';
    }
    
    // Extract CloudFront auth params from URL
    function extractCloudFrontAuth(url) {
        try {
            const urlObj = new URL(url);
            const params = new URLSearchParams(urlObj.search);
            const signature = params.get('Signature');
            const keyPairId = params.get('Key-Pair-Id');
            const policy = params.get('Policy');
            
            if (signature && keyPairId && policy) {
                return {
                    signature: decodeURIComponent(signature),
                    keyPairId: decodeURIComponent(keyPairId),
                    policy: decodeURIComponent(policy),
                    domain: urlObj.hostname
                };
            }
            return null;
        } catch(e) {
            return null;
        }
    }
    
    // Add auth params to any segment URL
    function addAuthToSegment(segmentUrl, auth) {
        if (!auth) return segmentUrl;
        
        // Parse the segment URL
        let fullUrl = segmentUrl;
        if (!segmentUrl.startsWith('http')) {
            // Relative URL - build full URL
            fullUrl = `https://${auth.domain}${segmentUrl.startsWith('/') ? segmentUrl : '/' + segmentUrl}`;
        }
        
        const urlObj = new URL(fullUrl);
        
        // Add CloudFront auth params (overwrite any existing)
        urlObj.searchParams.set('Signature', auth.signature);
        urlObj.searchParams.set('Key-Pair-Id', auth.keyPairId);
        urlObj.searchParams.set('Policy', auth.policy);
        
        // Preserve existing params like m= timestamp
        // They're already in the URL from the original segment URL
        
        return urlObj.toString();
    }
    
    // Main function: fetch manifest, rewrite ALL segment URLs with signatures
    async function loadStreamWithAutoSign(masterUrl) {
        if (!player) {
            const videoEl = document.createElement('video-js');
            videoEl.id = 'streamPlayer';
            videoEl.classList.add('video-js', 'vjs-big-play-centered');
            document.getElementById('playerContainer').innerHTML = '';
            document.getElementById('playerContainer').appendChild(videoEl);
            
            player = videojs(videoEl, {
                controls: true,
                autoplay: false,
                preload: 'auto',
                html5: {
                    hls: {
                        enableLowInitialPlaylist: true,
                        smoothQualityChange: true,
                        overrideNative: true
                    }
                },
                liveui: true,
                fluid: true,
                playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2]
            });
        }
        
        let url = masterUrl.trim();
        if (!url) {
            showToast("Please enter a URL", true);
            return false;
        }
        
        // Extract CloudFront auth parameters
        const auth = extractCloudFrontAuth(url);
        
        if (auth) {
            cloudfrontAuth = auth;
            updateStats(`✅ CloudFront auth detected!\nDomain: ${auth.domain}\nSignature: ${auth.signature.substring(0, 50)}...\nWill sign EVERY .ts segment automatically`, false);
            showToast("CloudFront auth detected - signing all segments", false);
        } else {
            updateStats(`⚠️ No CloudFront auth found in URL. Direct playback only.`, true);
        }
        
        // For HLS streams
        if (url.includes('.m3u8') || url.includes('cloudfront')) {
            try {
                // Fetch the master playlist
                updateStats("📥 Fetching manifest...", false);
                const response = await fetch(url, {
                    headers: {
                        'Origin': window.location.origin,
                        'Referer': window.location.origin
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                let manifestText = await response.text();
                let modifiedManifest = manifestText;
                let segmentCount = 0;
                
                // Rewrite ALL .ts segment URLs to include CloudFront signatures
                if (auth) {
                    // Pattern 1: Relative paths like "segment_123.ts" or "/path/segment.ts"
                    const relativePattern = /([a-zA-Z0-9_\-/]+\.ts)(\?[^\s\n]*)?/gi;
                    
                    modifiedManifest = modifiedManifest.replace(relativePattern, (match, segmentPath, query) => {
                        segmentCount++;
                        const signedUrl = addAuthToSegment(segmentPath, auth);
                        return signedUrl;
                    });
                    
                    // Pattern 2: Absolute URLs
                    const absolutePattern = /(https?:\/\/[^\s\n]+\.ts)(\?[^\s\n]*)?/gi;
                    modifiedManifest = modifiedManifest.replace(absolutePattern, (match, fullUrl, query) => {
                        const urlObj = new URL(fullUrl);
                        const signedUrl = addAuthToSegment(urlObj.pathname, auth);
                        return signedUrl;
                    });
                    
                    updateStats(`✅ Manifest processed! ${segmentCount} segment URLs signed.\n${modifiedManifest.substring(0, 200)}...`, false);
                } else {
                    updateStats(`⚠️ No auth params. Playing original manifest.`, true);
                }
                
                // Create blob URL with modified manifest
                const blob = new Blob([modifiedManifest], { type: 'application/vnd.apple.mpegurl' });
                const blobUrl = URL.createObjectURL(blob);
                
                // Load into player
                player.src({
                    src: blobUrl,
                    type: 'application/x-mpegURL'
                });
                
                // Monitor segment requests (for debugging)
                let segmentRequestCount = 0;
                const originalFetch = window.fetch;
                window.fetch = function(...args) {
                    const requestUrl = args[0];
                    if (typeof requestUrl === 'string' && requestUrl.includes('.ts')) {
                        segmentRequestCount++;
                        console.log(`🎬 Segment #${segmentRequestCount}: ${requestUrl.substring(0, 150)}...`);
                        updateStats(`🎬 Loading segment #${segmentRequestCount}...\n${requestUrl.substring(0, 100)}...`, false);
                    }
                    return originalFetch.apply(this, args);
                };
                
                // Reset fetch after 10 seconds
                setTimeout(() => {
                    window.fetch = originalFetch;
                }, 10000);
                
                player.on('error', () => {
                    const err = player.error();
                    if (err && err.code === 4) {
                        updateStats(`❌ Playback error - Media error. Signatures may have expired.`, true);
                        showToast("Stream error - signatures may have expired", true);
                    }
                });
                
                player.play().catch(e => showToast("Click the play button to start", false));
                
                // Cleanup blob URL
                player.one('loadeddata', () => {
                    setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
                });
                
            } catch (error) {
                console.error('Manifest fetch error:', error);
                updateStats(`❌ Failed to fetch manifest: ${error.message}\nTrying direct playback...`, true);
                showToast("Cannot fetch M3U8 - trying direct playback", true);
                
                // Fallback: direct playback
                player.src({ src: url, type: 'application/x-mpegURL' });
                player.play().catch(e => showToast("Direct playback also failed", true));
            }
        }
        else if (url.includes('.mp4')) {
            player.src({ src: url, type: 'video/mp4' });
            player.play().catch(e => showToast("Click play", false));
        }
        else {
            showToast("Unsupported format. Use .m3u8 or .mp4", true);
            return false;
        }
        
        return true;
    }
    
    // ========== UI Helpers ==========
    const videoUrlInput = document.getElementById('videoUrlInput');
    const notesUrlInput = document.getElementById('notesUrl');
    const dppUrlInput = document.getElementById('dppUrl');
    const loadBtn = document.getElementById('loadStreamBtn');
    const editLockBtn = document.getElementById('editLockBtn');
    const passwordModal = document.getElementById('passwordModal');
    const adminPassField = document.getElementById('adminPass');
    const submitPass = document.getElementById('submitPassBtn');
    const closePass = document.getElementById('closePassBtn');
    const editIndicator = document.getElementById('editModeIndicator');
    const resetBtn = document.getElementById('resetPlayerBtn');
    const saveSessionBtn = document.getElementById('saveSessionBtn');
    const exportLinksBtn = document.getElementById('exportLinksBtn');
    const viewNotesBtn = document.getElementById('viewNotesBtn');
    const viewDppBtn = document.getElementById('viewDppBtn');
    const shareBtn = document.getElementById('shareBtn');
    const shareModal = document.getElementById('shareModal');
    const shareLinkInput = document.getElementById('shareLinkInput');
    const copyShareBtn = document.getElementById('copyShareBtn');
    const closeShareModal = document.getElementById('closeShareModal');
    
    function applyEditMode(editable) {
        isEditMode = editable;
        if (editable) {
            videoUrlInput.removeAttribute('readonly');
            notesUrlInput.removeAttribute('readonly');
            dppUrlInput.removeAttribute('readonly');
            videoUrlInput.style.filter = 'none';
            notesUrlInput.style.filter = 'none';
            dppUrlInput.style.filter = 'none';
            videoUrlInput.style.background = 'rgba(0,224,161,0.1)';
            editLockBtn.innerHTML = '<i class="fas fa-unlock-alt"></i>';
            editIndicator.style.display = 'flex';
            showToast("Edit mode active", false);
        } else {
            videoUrlInput.setAttribute('readonly', 'readonly');
            notesUrlInput.setAttribute('readonly', 'readonly');
            dppUrlInput.setAttribute('readonly', 'readonly');
            videoUrlInput.style.filter = 'blur(3px)';
            notesUrlInput.style.filter = 'blur(3px)';
            dppUrlInput.style.filter = 'blur(3px)';
            editLockBtn.innerHTML = '<i class="fas fa-lock"></i>';
            editIndicator.style.display = 'none';
        }
    }
    
    function unlockWithPassword(pwd) {
        if (pwd === CORRECT_PASSWORD) {
            applyEditMode(true);
            passwordModal.style.display = 'none';
            adminPassField.value = '';
            localStorage.setItem('learnix_edit_mode', 'true');
        } else {
            showToast("Wrong password!", true);
            adminPassField.value = '';
        }
    }
    
    function lockEditing() {
        applyEditMode(false);
        localStorage.removeItem('learnix_edit_mode');
    }
    
    function saveCurrentSession() {
        const session = {
            video: videoUrlInput.value,
            notes: notesUrlInput.value,
            dpp: dppUrlInput.value,
            timestamp: Date.now()
        };
        localStorage.setItem('learnix_last_session', JSON.stringify(session));
        showToast("Session saved!", false);
    }
    
    function loadLastSession() {
        const saved = localStorage.getItem('learnix_last_session');
        if (saved) {
            try {
                const sess = JSON.parse(saved);
                if (sess.video) videoUrlInput.value = sess.video;
                if (sess.notes) notesUrlInput.value = sess.notes;
                if (sess.dpp) dppUrlInput.value = sess.dpp;
                showToast("Previous session loaded", false);
            } catch(e) {}
        }
    }
    
    function exportCurrentLinks() {
        const video = videoUrlInput.value || '(none)';
        const notes = notesUrlInput.value || '(none)';
        const dpp = dppUrlInput.value || '(none)';
        const exportText = `Video: ${video}\nNotes: ${notes}\nDPP: ${dpp}`;
        navigator.clipboard.writeText(exportText).then(() => showToast("Copied!", false));
    }
    
    function generateShareableURL() {
        const base = window.location.href.split('?')[0];
        const video = videoUrlInput.value;
        if (!video) return base;
        const params = new URLSearchParams();
        params.set('v', btoa(encodeURIComponent(video)));
        if (notesUrlInput.value) params.set('n', btoa(encodeURIComponent(notesUrlInput.value)));
        if (dppUrlInput.value) params.set('d', btoa(encodeURIComponent(dppUrlInput.value)));
        return `${base}?${params.toString()}`;
    }
    
    function openShareModal() {
        shareLinkInput.value = generateShareableURL();
        shareModal.style.display = 'flex';
    }
    
    function loadFromUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedVideo = urlParams.get('v');
        if (encodedVideo) {
            try { videoUrlInput.value = decodeURIComponent(atob(encodedVideo)); } catch(e) {}
        }
        const encodedNotes = urlParams.get('n');
        if (encodedNotes) {
            try { notesUrlInput.value = decodeURIComponent(atob(encodedNotes)); } catch(e) {}
        }
        const encodedDpp = urlParams.get('d');
        if (encodedDpp) {
            try { dppUrlInput.value = decodeURIComponent(atob(encodedDpp)); } catch(e) {}
        }
        if (videoUrlInput.value.trim()) {
            setTimeout(() => loadStreamWithAutoSign(videoUrlInput.value), 500);
        }
    }
    
    function resetAll() {
        if (player) { player.reset(); player.src({ type: '', src: '' }); }
        if (!isEditMode) { showToast("Enable edit mode to reset", true); return; }
        videoUrlInput.value = '';
        notesUrlInput.value = '';
        dppUrlInput.value = '';
        updateStats("🔐 Ready - Paste your signed M3U8 URL above", false);
        showToast("Reset complete", false);
    }
    
    // Event listeners
    loadBtn.addEventListener('click', () => {
        const url = videoUrlInput.value.trim();
        if (!url) { showToast("Enter video URL", true); return; }
        loadStreamWithAutoSign(url);
    });
    
    editLockBtn.addEventListener('click', () => {
        if (isEditMode) lockEditing();
        else passwordModal.style.display = 'flex';
    });
    
    submitPass.addEventListener('click', () => unlockWithPassword(adminPassField.value));
    closePass.addEventListener('click', () => { passwordModal.style.display = 'none'; adminPassField.value = ''; });
    adminPassField.addEventListener('keypress', (e) => { if(e.key === 'Enter') unlockWithPassword(adminPassField.value); });
    
    saveSessionBtn.addEventListener('click', saveCurrentSession);
    exportLinksBtn.addEventListener('click', exportCurrentLinks);
    resetBtn.addEventListener('click', resetAll);
    
    viewNotesBtn.addEventListener('click', () => {
        const url = notesUrlInput.value.trim();
        if (url) window.open(url, '_blank');
        else showToast("No notes URL", true);
    });
    viewDppBtn.addEventListener('click', () => {
        const url = dppUrlInput.value.trim();
        if (url) window.open(url, '_blank');
        else showToast("No DPP URL", true);
    });
    shareBtn.addEventListener('click', openShareModal);
    copyShareBtn.addEventListener('click', () => {
        shareLinkInput.select();
        navigator.clipboard.writeText(shareLinkInput.value);
        showToast("Link copied!", false);
    });
    closeShareModal.addEventListener('click', () => shareModal.style.display = 'none');
    
    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('learnix_edit_mode') === 'true') applyEditMode(true);
        else applyEditMode(false);
        loadLastSession();
        loadFromUrlParams();
    });
</script>
</body>
</html>
