<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PW STREAM · Auto Token Injection Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- dash.js & hls.js -->
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0c10;
            --bg-card: #11161e;
            --bg-elevated: #1a1f2a;
            --primary: #00e5ff;
            --primary-glow: 0 0 12px rgba(0,229,255,0.5);
            --text-primary: #ffffff;
            --text-secondary: #a0aab5;
            --border: #2a313c;
            --success: #00e5ff;
            --error: #ff4d4d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0e1219, #05070a);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00e5ff, #00c3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            color: white;
            transition: 0.2s;
            font-size: 0.9rem;
            border: 1px solid var(--border);
        }
        .btn-primary {
            background: var(--primary);
            color: #0a0c10;
            border: none;
            box-shadow: var(--primary-glow);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .btn-secondary:hover {
            background: #1f2a36;
            border-color: var(--primary);
        }

        /* player card */
        .player-card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid var(--border);
            overflow: hidden;
            padding: 20px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            margin-bottom: 24px;
        }
        .video-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16 / 9;
        }
        video {
            width: 100%;
            height: 100%;
            outline: none;
        }
        /* custom slim controls (optional) we rely on native + custom speed/quality */
        .controls-overlay {
            background: rgba(0,0,0,0.7);
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--border);
        }
        .ctrl-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .ctrl-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            transition: 0.2s;
        }
        .ctrl-btn:hover {
            color: var(--primary);
        }
        select, .speed-select {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: white;
            padding: 6px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #2a313c;
            border-radius: 5px;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        .time {
            font-size: 0.8rem;
            font-family: monospace;
        }

        /* url input */
        .url-section {
            margin-top: 20px;
        }
        .url-input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            background: var(--bg-elevated);
            padding: 8px 16px;
            border-radius: 60px;
            border: 1px solid var(--border);
        }
        .url-input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: monospace;
            font-size: 0.85rem;
            padding: 12px 0;
            outline: none;
        }
        .blurred {
            filter: blur(5px);
            background: #1a1f2a80;
            cursor: not-allowed;
        }
        .lock-overlay {
            position: relative;
        }

        /* debug console */
        .debug-console {
            background: #0a0e14;
            border-radius: 20px;
            padding: 16px;
            margin-top: 24px;
            border: 1px solid var(--border);
            font-family: 'Fira Code', monospace;
            font-size: 12px;
        }
        .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: var(--primary);
        }
        .log-list {
            max-height: 200px;
            overflow-y: auto;
            background: #030507;
            padding: 12px;
            border-radius: 16px;
        }
        .log-entry {
            font-family: monospace;
            font-size: 11px;
            padding: 4px 0;
            border-bottom: 0.5px solid #1f2a36;
            color: #b0c4de;
        }
        .log-success { color: #00e5ff; }
        .log-error { color: #ff7777; }
        .badge {
            background: var(--primary);
            color: #000;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--primary);
            text-align: center;
        }
        .modal-card input {
            background: #1a1f2a;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            color: white;
            margin: 16px 0;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #11161e;
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 40px;
            z-index: 1100;
            display: none;
            border-left: 4px solid var(--primary);
        }
        @media (max-width: 700px) {
            .controls-overlay { flex-direction: column; align-items: stretch; }
            .progress-container { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-shield-alt"></i> PW STREAM</h1>
            <p>auto token injection · DASH/HLS · zero 403</p>
        </div>
        <div class="actions">
            <button class="btn btn-secondary" id="lockBtn"><i class="fas fa-lock"></i> Locked</button>
            <button class="btn btn-secondary" id="resetBtn"><i class="fas fa-trash-alt"></i> Reset</button>
            <button class="btn btn-secondary" id="shareBtn"><i class="fas fa-share-alt"></i> Share</button>
        </div>
    </div>

    <div class="player-card">
        <div class="video-wrapper">
            <video id="videoPlayer" poster="https://i.postimg.cc/T2psP7QG/73f6e3b1-211e-4b7e-9eac-9881f90bc471.png" controlsList="nodownload" playsinline></video>
        </div>
        <div class="controls-overlay">
            <div class="ctrl-group">
                <button class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                <button class="ctrl-btn" id="volumeBtn"><i class="fas fa-volume-up"></i></button>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" style="width: 80px;">
            </div>
            <div class="progress-container">
                <span class="time" id="currentTime">0:00</span>
                <input type="range" id="seekBar" value="0" step="0.001">
                <span class="time" id="duration">0:00</span>
            </div>
            <div class="ctrl-group">
                <select id="speedSelect" class="speed-select">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
                <select id="qualitySelect" class="speed-select" disabled>
                    <option>Auto</option>
                </select>
                <button class="ctrl-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
            </div>
        </div>

        <div class="url-section">
            <div class="url-input-group" id="urlGroup">
                <i class="fas fa-link" style="color: var(--primary);"></i>
                <input type="text" id="streamUrl" placeholder="Paste .mpd or .m3u8 with token params (URLPrefix, Expires, KeyName, Signature)" value="" readonly class="blurred">
                <div id="urlLockOverlay" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%);">
                    <i class="fas fa-lock" style="color: var(--primary);"></i>
                </div>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 16px;">
                <button class="btn btn-primary" id="loadBtn"><i class="fas fa-play"></i> Load & Play</button>
                <button class="btn btn-secondary" id="clearLogsBtn"><i class="fas fa-broom"></i> Clear logs</button>
            </div>
        </div>
    </div>

    <!-- debug console -->
    <div class="debug-console">
        <div class="debug-header">
            <span><i class="fas fa-terminal"></i> 🔐 TOKEN INJECTION MONITOR</span>
            <span id="tokenBadge" class="badge">⚡ waiting</span>
        </div>
        <div class="log-list" id="logList">
            <div class="log-entry">🟢 ready — paste protected URL</div>
            <div class="log-entry">🔧 Token will be appended to every .mpd/.m3u8/.m4s/.ts/init.mp4 request</div>
        </div>
    </div>
</div>

<!-- password modal -->
<div id="passwordModal" class="modal">
    <div class="modal-card">
        <i class="fas fa-shield-alt" style="font-size: 48px; color: var(--primary);"></i>
        <h3>Admin Unlock</h3>
        <p>Enter password to edit URL</p>
        <input type="password" id="adminPass" placeholder="Password">
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary" id="submitPassBtn">Unlock</button>
            <button class="btn btn-secondary" id="closePassBtn">Cancel</button>
        </div>
        <p style="font-size: 12px; margin-top: 15px;">default: murlikumar65@</p>
    </div>
</div>

<!-- share modal (simple) -->
<div id="shareModal" class="modal">
    <div class="modal-card">
        <h3>Share Session</h3>
        <input type="text" id="shareLink" readonly style="width:100%; margin:16px 0; background:#1a1f2a; border:none; padding:12px; border-radius:40px; color:white;">
        <button class="btn btn-primary" id="copyShareBtn">Copy Link</button>
        <button class="btn btn-secondary" id="closeShareModalBtn" style="margin-top:12px;">Close</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ---------- DOM elements ----------
    const video = document.getElementById('videoPlayer');
    const streamUrlInput = document.getElementById('streamUrl');
    const loadBtn = document.getElementById('loadBtn');
    const lockBtn = document.getElementById('lockBtn');
    const resetBtn = document.getElementById('resetBtn');
    const shareBtn = document.getElementById('shareBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const volumeBtn = document.getElementById('volumeBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const seekBar = document.getElementById('seekBar');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const speedSelect = document.getElementById('speedSelect');
    const qualitySelect = document.getElementById('qualitySelect');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const logList = document.getElementById('logList');
    const tokenBadge = document.getElementById('tokenBadge');
    const clearLogsBtn = document.getElementById('clearLogsBtn');

    // player instances
    let dashPlayer = null;
    let hlsPlayer = null;
    let currentType = null; // 'dash', 'hls', 'mp4'
    let tokenQueryStr = '';  // extracted from main URL
    let isEditMode = false;
    const CORRECT_PASS = "murlikumar65@";

    // helper: add log
    function addLog(message, isError = false) {
        const div = document.createElement('div');
        div.className = `log-entry ${isError ? 'log-error' : 'log-success'}`;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
        logList.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showToast(msg, error = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        toast.style.background = error ? '#b91c1cd9' : '#11161ed9';
        toast.style.borderLeftColor = error ? '#ff4d4d' : '#00e5ff';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // ---------- extract token query from master URL ----------
    function extractTokenFromUrl(url) {
        try {
            const u = new URL(url);
            const params = u.searchParams;
            const URLPrefix = params.get('URLPrefix');
            const Expires = params.get('Expires');
            const KeyName = params.get('KeyName');
            const Signature = params.get('Signature');
            if (URLPrefix && Expires && KeyName && Signature) {
                const token = `URLPrefix=${encodeURIComponent(URLPrefix)}&Expires=${encodeURIComponent(Expires)}&KeyName=${encodeURIComponent(KeyName)}&Signature=${encodeURIComponent(Signature)}`;
                addLog(`✅ TOKEN extracted: ${token.substring(0, 80)}...`);
                tokenBadge.innerText = '🔐 Token active';
                return token;
            } else {
                addLog(`⚠️ Missing token parameters, some requests may 403`, true);
                tokenBadge.innerText = '⚠️ No token';
                return '';
            }
        } catch(e) {
            addLog(`❌ Invalid URL: ${e.message}`, true);
            return '';
        }
    }

    // inject token into any URL (preserve existing query)
    function injectTokenToUrl(requestUrl) {
        if (!tokenQueryStr) return requestUrl;
        if (!requestUrl) return requestUrl;
        // avoid double injection
        if (requestUrl.includes('URLPrefix=') && requestUrl.includes('Signature=')) return requestUrl;
        try {
            const separator = requestUrl.includes('?') ? '&' : '?';
            return requestUrl + separator + tokenQueryStr;
        } catch(e) {
            return requestUrl;
        }
    }

    // ---------- DASH.JS with RequestModifier ----------
    function initDash(url) {
        if (dashPlayer) {
            dashPlayer.reset();
            dashPlayer = null;
        }
        if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
        currentType = 'dash';
        const context = dashjs.Context.getInstance();
        dashPlayer = dashjs.MediaPlayer().create();
        dashPlayer.initialize(video, url, true);
        // ---- token interceptor ----
        dashPlayer.extend('RequestModifier', function() {
            return {
                modifyRequestURL: function(originalUrl) {
                    let modified = injectTokenToUrl(originalUrl);
                    if (modified !== originalUrl) {
                        addLog(`🔁 DASH segment modified: ${originalUrl.split('/').pop()} → token attached`);
                    }
                    return modified;
                }
            };
        }, true);
        dashPlayer.on('error', (e) => addLog(`DASH error: ${e}`, true));
        dashPlayer.on('streamInitialized', () => addLog('✅ DASH stream ready, token injection active'));
        // quality selector from dash
        updateDashQualityOptions();
        dashPlayer.play().catch(e => addLog(`Play error: ${e}`, true));
    }

    function updateDashQualityOptions() {
        if (!dashPlayer) return;
        setTimeout(() => {
            const bitrates = dashPlayer.getBitrateInfoListFor('video');
            if (bitrates && bitrates.length) {
                qualitySelect.disabled = false;
                qualitySelect.innerHTML = '<option value="auto">Auto</option>';
                bitrates.forEach((level, idx) => {
                    const option = document.createElement('option');
                    option.value = level.qualityIndex;
                    option.text = `${level.height}p (${Math.round(level.bitrate/1000)}kbps)`;
                    qualitySelect.appendChild(option);
                });
                qualitySelect.onchange = () => {
                    if (qualitySelect.value === 'auto') dashPlayer.setQualityFor('video', -1);
                    else dashPlayer.setQualityFor('video', parseInt(qualitySelect.value), false);
                };
            } else {
                qualitySelect.disabled = true;
                qualitySelect.innerHTML = '<option>Qualities</option>';
            }
        }, 1000);
    }

    // ---------- HLS.JS with xhrSetup ----------
    function initHls(url) {
        if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
        if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; }
        currentType = 'hls';
        if (Hls.isSupported()) {
            hlsPlayer = new Hls({
                xhrSetup: (xhr, xhrUrl) => {
                    let modifiedUrl = injectTokenToUrl(xhrUrl);
                    if (modifiedUrl !== xhrUrl) {
                        addLog(`🔁 HLS xhr interceptor: ${xhrUrl.split('/').pop()} → token added`);
                    }
                    xhr.open('GET', modifiedUrl, true);
                },
                manifestLoadingMaxRetry: 2,
                levelLoadingMaxRetry: 2
            });
            hlsPlayer.loadSource(url);
            hlsPlayer.attachMedia(video);
            hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                addLog(`✅ HLS manifest parsed, token injection active`);
                updateHlsQualityOptions();
                video.play().catch(e => addLog(`autoplay blocked: ${e}`, true));
            });
            hlsPlayer.on(Hls.Events.ERROR, (_, data) => {
                if (data.fatal) addLog(`❌ HLS fatal error: ${data.type}`, true);
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = injectTokenToUrl(url);
            addLog(`📱 Native HLS (safari) with token injection (URL modified)`);
        } else {
            addLog(`❌ HLS not supported`, true);
        }
    }

    function updateHlsQualityOptions() {
        if (!hlsPlayer) return;
        setTimeout(() => {
            const levels = hlsPlayer.levels;
            if (levels && levels.length) {
                qualitySelect.disabled = false;
                qualitySelect.innerHTML = '<option value="-1">Auto</option>';
                levels.forEach((level, idx) => {
                    const option = document.createElement('option');
                    option.value = idx;
                    option.text = `${level.height}p`;
                    qualitySelect.appendChild(option);
                });
                qualitySelect.onchange = () => {
                    const idx = parseInt(qualitySelect.value);
                    if (idx === -1) hlsPlayer.currentLevel = -1;
                    else hlsPlayer.currentLevel = idx;
                };
            } else {
                qualitySelect.disabled = true;
                qualitySelect.innerHTML = '<option>Qualities</option>';
            }
        }, 800);
    }

    // ---------- destroy everything ----------
    function destroyPlayer() {
        if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; }
        if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
        video.pause();
        video.src = '';
        video.load();
        currentType = null;
        addLog('🛑 Player destroyed');
    }

    // main load with token extraction
    function loadStream() {
        let mainUrl = streamUrlInput.value.trim();
        if (!mainUrl) { showToast("Enter stream URL", true); return; }
        destroyPlayer();
        tokenQueryStr = extractTokenFromUrl(mainUrl);
        if (!tokenQueryStr) {
            addLog(`⚠️ No token parameters in URL, segment requests may fail`, true);
        } else {
            addLog(`✨ Token injection armed, every segment will receive query`);
        }
        // detect DASH or HLS
        if (mainUrl.includes('.mpd')) {
            initDash(mainUrl);
            addLog(`🎬 DASH mode: ${mainUrl.split('/').pop()}`);
        } else if (mainUrl.includes('.m3u8') || mainUrl.includes('m3u8')) {
            initHls(mainUrl);
            addLog(`🎬 HLS mode: ${mainUrl.split('/').pop()}`);
        } else if (mainUrl.includes('.mp4') || mainUrl.includes('.webm')) {
            currentType = 'mp4';
            video.src = injectTokenToUrl(mainUrl);
            video.play().catch(e => addLog(`MP4 error: ${e}`));
            addLog(`📀 MP4 direct with token injection (if any)`);
        } else {
            showToast("Unsupported format, use .mpd / .m3u8", true);
        }
    }

    // UI events
    loadBtn.addEventListener('click', loadStream);
    resetBtn.addEventListener('click', () => {
        destroyPlayer();
        if (isEditMode) streamUrlInput.value = '';
        else showToast("Unlock to reset URL", true);
    });

    // Edit mode lock
    function updateEditUI() {
        if (isEditMode) {
            streamUrlInput.classList.remove('blurred');
            streamUrlInput.readOnly = false;
            lockBtn.innerHTML = '<i class="fas fa-unlock-alt"></i> Unlocked';
            lockBtn.style.background = '#00e5ff20';
            document.getElementById('urlLockOverlay')?.remove();
        } else {
            streamUrlInput.classList.add('blurred');
            streamUrlInput.readOnly = true;
            lockBtn.innerHTML = '<i class="fas fa-lock"></i> Locked';
            lockBtn.style.background = '';
            if (!document.getElementById('urlLockOverlay')) {
                const overlay = document.createElement('div');
                overlay.id = 'urlLockOverlay';
                overlay.style.cssText = 'position:absolute; right:20px; top:50%; transform:translateY(-50%);';
                overlay.innerHTML = '<i class="fas fa-lock" style="color:var(--primary);"></i>';
                document.querySelector('.url-input-group').style.position = 'relative';
                document.querySelector('.url-input-group').appendChild(overlay);
            }
        }
    }

    lockBtn.addEventListener('click', () => {
        if (isEditMode) {
            isEditMode = false;
            localStorage.setItem('pw_edit_mode', 'false');
            updateEditUI();
            showToast("Editing locked");
        } else {
            document.getElementById('passwordModal').style.display = 'flex';
        }
    });
    document.getElementById('submitPassBtn').addEventListener('click', () => {
        const pass = document.getElementById('adminPass').value;
        if (pass === CORRECT_PASS) {
            isEditMode = true;
            localStorage.setItem('pw_edit_mode', 'true');
            document.getElementById('passwordModal').style.display = 'none';
            updateEditUI();
            showToast("Edit mode unlocked, you can modify URL");
        } else {
            showToast("Wrong password", true);
        }
        document.getElementById('adminPass').value = '';
    });
    document.getElementById('closePassBtn').addEventListener('click', () => {
        document.getElementById('passwordModal').style.display = 'none';
    });

    // share modal
    shareBtn.addEventListener('click', () => {
        const shareUrl = window.location.href.split('?')[0] + '?url=' + btoa(streamUrlInput.value);
        document.getElementById('shareLink').value = shareUrl;
        document.getElementById('shareModal').style.display = 'flex';
    });
    document.getElementById('copyShareBtn').addEventListener('click', () => {
        const input = document.getElementById('shareLink');
        input.select();
        navigator.clipboard.writeText(input.value);
        showToast("Share link copied");
    });
    document.getElementById('closeShareModalBtn').addEventListener('click', () => {
        document.getElementById('shareModal').style.display = 'none';
    });

    // clear logs
    clearLogsBtn.addEventListener('click', () => {
        logList.innerHTML = '<div class="log-entry">🧹 logs cleared</div>';
    });

    // load from URL param
    function loadFromParams() {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get('url');
        if (encoded) {
            try {
                const url = atob(encoded);
                streamUrlInput.value = url;
                isEditMode = true;
                updateEditUI();
                setTimeout(() => loadStream(), 300);
            } catch(e) {}
        }
    }

    // video controls binding
    video.addEventListener('loadedmetadata', () => {
        durationSpan.innerText = formatTime(video.duration);
        seekBar.max = video.duration;
    });
    video.addEventListener('timeupdate', () => {
        currentTimeSpan.innerText = formatTime(video.currentTime);
        if (!isNaN(video.duration)) seekBar.value = video.currentTime;
    });
    seekBar.addEventListener('input', () => video.currentTime = seekBar.value);
    playPauseBtn.addEventListener('click', () => {
        if (video.paused) video.play().catch(e => addLog(`play error: ${e}`));
        else video.pause();
    });
    video.addEventListener('play', () => playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>');
    video.addEventListener('pause', () => playPauseBtn.innerHTML = '<i class="fas fa-play"></i>');
    volumeSlider.addEventListener('input', () => {
        video.volume = volumeSlider.value;
        volumeBtn.innerHTML = video.volume === 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    });
    volumeBtn.addEventListener('click', () => {
        video.muted = !video.muted;
        volumeBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    });
    speedSelect.addEventListener('change', () => video.playbackRate = parseFloat(speedSelect.value));
    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) video.requestFullscreen().catch(e=>addLog(e));
        else document.exitFullscreen();
    });

    function formatTime(sec) {
        if (isNaN(sec)) return "0:00";
        const mins = Math.floor(sec / 60);
        const seconds = Math.floor(sec % 60);
        return `${mins}:${seconds.toString().padStart(2,'0')}`;
    }

    // global network interceptor (extra safety for any fetch/XHR)
    const originalFetch = window.fetch;
    window.fetch = function(...args) {
        let url = args[0];
        if (typeof url === 'string' && (url.includes('.m4s') || url.includes('init.mp4') || url.includes('.ts') || url.includes('audio') || url.includes('video'))) {
            let modUrl = injectTokenToUrl(url);
            if (modUrl !== url) addLog(`🌐 fetch interceptor: ${url.split('/').pop()} token added`);
            return originalFetch.call(this, modUrl, args[1]);
        }
        return originalFetch.apply(this, args);
    };

    // xhr interceptor backup
    const XHR = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url, async, user, pass) {
        let newUrl = url;
        if (typeof url === 'string' && (url.includes('.m4s') || url.includes('init.mp4') || url.includes('.ts') || url.includes('segment'))) {
            newUrl = injectTokenToUrl(url);
            if (newUrl !== url) addLog(`🌐 XHR interceptor: ${url.split('/').pop()} token added`);
        }
        return XHR.call(this, method, newUrl, async, user, pass);
    };

    // initial state
    (function init() {
        const stored = localStorage.getItem('pw_edit_mode') === 'true';
        isEditMode = stored;
        updateEditUI();
        loadFromParams();
        addLog(`🚀 PW Token Injector ready — every .m4s/.ts/init.mp4 will receive URLPrefix,Expires,KeyName,Signature`);
    })();
</script>
</body>
</html>
