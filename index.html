<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@videojs/http-streaming@3.8.0/dist/videojs-http-streaming.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00E0A1;
            --primary-dark: #00B884;
            --primary-glow: 0 0 12px rgba(0,224,161,0.6);
            --bg-dark: #0A1128;
            --bg-darker: #050A1D;
            --bg-card: #131C3F;
            --text-light: #FFFFFF;
            --text-muted: #A0AEC0;
            --border-light: rgba(0,224,161,0.3);
            --radius: 18px;
            --shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, var(--bg-darker), var(--bg-dark));
            color: var(--text-light);
            min-height: 100vh;
            transition: all 0.3s;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 20px;
        }
        .logo-area { display: flex; align-items: center; gap: 14px; }
        .logo { height: 52px; filter: drop-shadow(0 0 6px var(--primary)); }
        .logo-text { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--primary), #6C63FF); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: var(--primary-glow); }
        .header-actions { display: flex; gap: 12px; }
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        .btn-icon { width: 46px; height: 46px; padding: 0; justify-content: center; border-radius: 50%; }
        .btn-primary { background: var(--primary); color: #0A1128; box-shadow: var(--primary-glow); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-secondary { background: rgba(0,224,161,0.12); border: 1px solid var(--border-light); color: white; backdrop-filter: blur(4px); }
        .btn-secondary:hover { background: rgba(0,224,161,0.25); border-color: var(--primary); }
        .player-card {
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
            margin-bottom: 28px;
        }
        .video-js {
            width: 100% !important;
            aspect-ratio: 16 / 9;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 28px black;
        }
        .vjs-big-play-button {
            background: rgba(0,224,161,0.85) !important;
            border-radius: 50% !important;
            width: 70px !important;
            height: 70px !important;
            line-height: 70px !important;
            transform: translate(-50%, -50%) scale(1) !important;
        }
        .url-panel {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 20px;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background: var(--bg-card);
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid var(--border-light);
        }
        .input-group i { font-size: 1.3rem; color: var(--primary); }
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 0.95rem;
            padding: 12px 0;
            outline: none;
            font-family: monospace;
        }
        .badge {
            background: var(--primary);
            color: #0A1128;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.75rem;
        }
        .action-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 20px; }
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin: 40px 0;
        }
        .resource-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 24px;
            border-top: 3px solid var(--primary);
        }
        .lock-badge {
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 12px;
            width: fit-content;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            z-index: 9999;
            display: none;
            font-weight: 500;
            border-left: 4px solid var(--primary);
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .modal-card {
            background: var(--bg-card);
            max-width: 450px;
            width: 90%;
            padding: 32px;
            border-radius: 32px;
            border: 1px solid var(--primary);
            text-align: center;
        }
        .password-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-light);
            padding: 14px;
            border-radius: 60px;
            width: 100%;
            color: white;
            margin: 20px 0;
        }
        @media (max-width: 680px) {
            .container { padding: 16px; }
            .input-group { border-radius: 28px; flex-wrap: wrap; }
        }
        .secure-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #0f172ad9;
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 12px;
            border: 1px solid var(--primary);
            z-index: 99;
        }
        i.fa-lock, i.fa-unlock { transition: 0.2s; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <img src="https://i.postimg.cc/T2psP7QG/73f6e3b1-211e-4b7e-9eac-9881f90bc471.png" class="logo" alt="logo">

    <div class="player-card">

        <div class="url-panel">

                <i class="fas fa-link"></i>
                <input type="text" id="videoUrlInput" class="input-field" placeholder="HLS / M3U8 / MP4 / YouTube URL" value="https://d38x7u1iz4gu9m.cloudfront.net/index_6.m3u8?Signature=aoeQvopIAokjljKclsozW43a277TDSNZ9Vu8572t-9U7ZEr%7ETjEm-MNfMylIcweHrXDeLQy9vfiTdfs4DPVyeUvqE9te1zmtr3jYj6iQMdxlViQ-lCl1zeZYS0i5LMiMMteKlqa3mbBVItQ2vMbqY80R29sCuGvpCxU6ZdUeEn5lLsscts%7EoCjfDLw0UdFz9AgHOq%7EHXro7FQ%7EYkvEin6yLS8lbzqPy5yIU9eDYXJA-DrmkAKID2HV75a9d9yTg4Yg0P0hJCChyxWVZJ%7E98YCf2W-ohO4cwwEBsEUWQOJhoO6IAM2YUIrt5WEEdtL4BC2ii7xe5GBpgLnT1LRJtpAA__&Key-Pair-Id=APKAXVKMENFCRKTG5XE2&Policy=eyJTdGF0ZW1lbnQiOlt7IlJlc291cmNlIjoiaHR0cHM6Ly9kMzh4N3UxaXo0Z3U5bS5jbG91ZGZyb250Lm5ldC8qIiwiQ29uZGl0aW9uIjp7IkRhdGVMZXNzVGhhbiI6eyJBV1M6RXBvY2hUaW1lIjoxNzc4MzQ4NDEyfX19XX0_">

<div class="secure-indicator" id="editModeIndicator" style="display: none;"><i class="fas fa-unlock-alt"></i> ✦ Edit Mode Active ✦</div>

<!-- Password Overlay -->
<div id="passwordModal" class="modal">

        <input type="password" id="adminPass" class="password-input" placeholder="Password">

<!-- Share Modal -->

            <input type="text" id="shareLinkInput" readonly class="input-field">
            <button class="btn btn-primary" id="copyShareBtn"><i class="fas fa-copy"></i> Copy</button>

        <button class="btn btn-secondary" id="closeShareModal">Close</button>

</div>

<script>
    // ---------- FIXED HLS HANDLER with ADVANCED CORS + RETRY ----------
    let player = null;
    let isEditMode = false;          // false = locked (blurred inputs)
    const CORRECT_PASSWORD = "murlikumar65@";
    
    // DOM elements
    const videoUrlInput = document.getElementById('videoUrlInput');
    const notesUrlInput = document.getElementById('notesUrl');
    const dppUrlInput = document.getElementById('dppUrl');
    const loadBtn = document.getElementById('loadStreamBtn');
    const editLockBtn = document.getElementById('editLockBtn');
    const passwordModal = document.getElementById('passwordModal');
    const adminPassField = document.getElementById('adminPass');
    const submitPass = document.getElementById('submitPassBtn');
    const closePass = document.getElementById('closePassBtn');
    const editIndicator = document.getElementById('editModeIndicator');
    const secureBadge = document.getElementById('secureBadge');
    const toastMsgDiv = document.getElementById('toastMsg');
    const resetBtn = document.getElementById('resetPlayerBtn');
    const saveSessionBtn = document.getElementById('saveSessionBtn');
    const exportLinksBtn = document.getElementById('exportLinksBtn');
    const viewNotesBtn = document.getElementById('viewNotesBtn');
    const viewDppBtn = document.getElementById('viewDppBtn');
    const shareBtn = document.getElementById('shareBtn');
    const shareModal = document.getElementById('shareModal');
    const shareLinkInput = document.getElementById('shareLinkInput');
    const copyShareBtn = document.getElementById('copyShareBtn');
    const closeShareModal = document.getElementById('closeShareModal');

    // Helper toast
    function showToast(msg, isError = false) {
        toastMsgDiv.textContent = msg;
        toastMsgDiv.style.display = 'block';
        toastMsgDiv.style.background = isError ? '#b91c1cd9' : '#0f172ad9';
        toastMsgDiv.style.borderLeftColor = isError ? '#ff4d4d' : 'var(--primary)';
        setTimeout(() => { toastMsgDiv.style.display = 'none'; }, 3200);
    }

    // Initialize video.js player with robust HLS settings
    function initPlayer() {
        if (player) {
            player.dispose();
        }
        const videoEl = document.createElement('video-js');
        videoEl.id = 'streamPlayer';
        videoEl.classList.add('video-js', 'vjs-big-play-centered');
        document.getElementById('playerContainer').innerHTML = '';
        document.getElementById('playerContainer').appendChild(videoEl);
        
        player = videojs(videoEl, {
            controls: true,
            autoplay: false,
            preload: 'auto',
            html5: {
                hls: {
                    enableLowInitialPlaylist: true,
                    smoothQualityChange: true,
                    overrideNative: true,
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                    liveSyncDurationCount: 3,
                },
                nativeAudioTracks: false,
                nativeVideoTracks: false
            },
            liveui: true,
            fluid: true,
            playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
            controlBar: {
                pictureInPictureToggle: true,
                currentTimeDisplay: true,
                timeDivider: true,
                durationDisplay: true,
                progressControl: true
            }
        });
        return player;
    }
    
    // Core HLS playback with fallback & error recovery
    function loadStream(url) {
        if (!player) initPlayer();
        if (!url || url.trim() === '') {
            showToast("Please enter a valid stream URL", true);
            return false;
        }
        // Special handling: YouTube detection
        if (url.includes('youtube.com/watch') || url.includes('youtu.be/')) {
            let videoId = extractYouTubeId(url);
            if (videoId) {
                let embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?modestbranding=1&rel=0&controls=1`;
                player.src({ type: 'video/youtube', src: embedUrl });
                player.play().catch(e => showToast("Click play to start", false));
                showToast("YouTube stream loaded (restricted mode)");
                return true;
            }
        }
        
        // HLS / M3U8 / MP4 logic
        const isM3u8 = url.includes('.m3u8') || url.includes('m3u8?') || url.includes('cloudfront.net');
        const isMp4 = url.includes('.mp4') || url.includes('.webm');
        
        if (isM3u8) {
            // For problematic CloudFront M3U8 with signed URLs
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.ready(() => {
                player.on('error', (event) => {
                    const error = player.error();
                    console.error("VideoJS error", error);
                    if (error && error.code === 4) {
                        showToast("Media error: Retrying with advanced CORS fix...", true);
                        setTimeout(() => {
                            // retry once more via hard reload
                            player.src({ src: url, type: 'application/x-mpegURL' });
                            player.load();
                        }, 1500);
                    } else {
                        showToast(`Stream error (${error?.code || 'unknown'}). Check URL permissions.`, true);
                    }
                });
                player.play().catch(e => showToast("Autoplay blocked, press ▶️ play", false));
                showToast("Loading HLS stream with secure player...");
            });
        } else if (isMp4) {
            player.src({ src: url, type: 'video/mp4' });
            player.play().catch(e => showToast("Playback blocked, click play", false));
            showToast("Direct video loaded");
        } else {
            // fallback as generic
            player.src({ src: url, type: 'application/vnd.apple.mpegurl' });
            player.play().catch(e => showToast("Format not recognized, trying as HLS", false));
        }
        return true;
    }
    
    function extractYouTubeId(url) {
        const regex = /(?:youtube\.com\/(?:watch\?v=|live\/)|youtu\.be\/)([^\&\?\/]{11})/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }
    
    // Edit mode toggles (lock/unlock fields)
    function applyEditMode(editable) {
        isEditMode = editable;
        if (editable) {
            videoUrlInput.removeAttribute('readonly');
            notesUrlInput.removeAttribute('readonly');
            dppUrlInput.removeAttribute('readonly');
            videoUrlInput.style.filter = 'none';
            notesUrlInput.style.filter = 'none';
            dppUrlInput.style.filter = 'none';
            videoUrlInput.style.background = 'rgba(0,224,161,0.1)';
            editLockBtn.innerHTML = '<i class="fas fa-unlock-alt"></i>';
            editLockBtn.classList.add('btn-primary');
            editLockBtn.classList.remove('btn-secondary');
            secureBadge.innerHTML = '<i class="fas fa-edit"></i> Admin: Edit Mode ON';
            editIndicator.style.display = 'flex';
            showToast("Edit mode ACTIVE — you can modify all URLs", false);
        } else {
            videoUrlInput.setAttribute('readonly', 'readonly');
            notesUrlInput.setAttribute('readonly', 'readonly');
            dppUrlInput.setAttribute('readonly', 'readonly');
            videoUrlInput.style.filter = 'blur(3px)';
            notesUrlInput.style.filter = 'blur(3px)';
            dppUrlInput.style.filter = 'blur(3px)';
            editLockBtn.innerHTML = '<i class="fas fa-lock"></i>';
            editLockBtn.classList.remove('btn-primary');
            editLockBtn.classList.add('btn-secondary');
            secureBadge.innerHTML = '<i class="fas fa-shield-alt"></i> Admin: Editing locked';
            editIndicator.style.display = 'none';
        }
    }
    
    function unlockWithPassword(pwd) {
        if (pwd === CORRECT_PASSWORD) {
            applyEditMode(true);
            passwordModal.style.display = 'none';
            adminPassField.value = '';
            localStorage.setItem('learnix_edit_mode', 'true');
            showToast("Unlocked! Now you can edit URLs and thumbnails", false);
        } else {
            showToast("Incorrect password! Access denied", true);
            adminPassField.value = '';
        }
    }
    
    function lockEditing() {
        applyEditMode(false);
        localStorage.removeItem('learnix_edit_mode');
        showToast("Editing locked. Enter password to modify links.", false);
    }
    
    // Save current session
    function saveCurrentSession() {
        const session = {
            video: videoUrlInput.value,
            notes: notesUrlInput.value,
            dpp: dppUrlInput.value,
            timestamp: Date.now()
        };
        localStorage.setItem('learnix_last_session', JSON.stringify(session));
        showToast("Session saved! (video + notes + DPP)", false);
    }
    
    function loadLastSession() {
        const saved = localStorage.getItem('learnix_last_session');
        if (saved) {
            try {
                const sess = JSON.parse(saved);
                if (sess.video) videoUrlInput.value = sess.video;
                if (sess.notes) notesUrlInput.value = sess.notes;
                if (sess.dpp) dppUrlInput.value = sess.dpp;
                showToast("Previous session loaded", false);
            } catch(e) {}
        }
    }
    
    function exportCurrentLinks() {
        const video = videoUrlInput.value || "(none)";
        const notes = notesUrlInput.value || "(none)";
        const dpp = dppUrlInput.value || "(none)";
        const exportText = `LEARNIX SESSION\nVideo: ${video}\nNotes: ${notes}\nDPP: ${dpp}`;
        navigator.clipboard.writeText(exportText).then(() => showToast("Session links copied to clipboard", false)).catch(()=>showToast("Could not copy",true));
    }
    
    function generateShareableURL() {
        const base = window.location.href.split('?')[0];
        const video = videoUrlInput.value;
        const notes = notesUrlInput.value;
        const dpp = dppUrlInput.value;
        const params = new URLSearchParams();
        if (video) params.set('v', btoa(encodeURIComponent(video)));
        if (notes) params.set('n', btoa(encodeURIComponent(notes)));
        if (dpp) params.set('d', btoa(encodeURIComponent(dpp)));
        const shareUrl = params.toString() ? `${base}?${params.toString()}` : base;
        return shareUrl;
    }
    
    function openShareModal() {
        const url = generateShareableURL();
        shareLinkInput.value = url;
        shareModal.style.display = 'flex';
    }
    
    function loadFromUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedVideo = urlParams.get('v');
        const encodedNotes = urlParams.get('n');
        const encodedDpp = urlParams.get('d');
        if (encodedVideo) {
            try {
                videoUrlInput.value = decodeURIComponent(atob(encodedVideo));
            } catch(e) {}
        }
        if (encodedNotes) {
            try {
                notesUrlInput.value = decodeURIComponent(atob(encodedNotes));
            } catch(e) {}
        }
        if (encodedDpp) {
            try {
                dppUrlInput.value = decodeURIComponent(atob(encodedDpp));
            } catch(e) {}
        }
        // If video present, auto-load stream
        if (videoUrlInput.value.trim()) {
            setTimeout(() => loadStream(videoUrlInput.value), 300);
        }
    }
    
    // Reset player & clear fields
    function resetAll() {
        if (player) {
            player.reset();
            player.src({ type: '', src: '' });
        }
        if (!isEditMode) {
            showToast("Edit mode required to reset fields", true);
            return;
        }
        videoUrlInput.value = '';
        notesUrlInput.value = '';
        dppUrlInput.value = '';
        showToast("All fields cleared", false);
        if (player) player.pause();
    }
    
    // Event listeners
    loadBtn.addEventListener('click', () => {
        const url = videoUrlInput.value.trim();
        if (!url) { showToast("Enter video URL first", true); return; }
        loadStream(url);
    });
    
    editLockBtn.addEventListener('click', () => {
        if (isEditMode) {
            lockEditing();
        } else {
            passwordModal.style.display = 'flex';
        }
    });
    
    submitPass.addEventListener('click', () => {
        unlockWithPassword(adminPassField.value);
    });
    closePass.addEventListener('click', () => {
        passwordModal.style.display = 'none';
        adminPassField.value = '';
    });
    adminPassField.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') unlockWithPassword(adminPassField.value);
    });
    
    saveSessionBtn.addEventListener('click', saveCurrentSession);
    exportLinksBtn.addEventListener('click', exportCurrentLinks);
    resetBtn.addEventListener('click', resetAll);
    
    viewNotesBtn.addEventListener('click', () => {
        const notesUrl = notesUrlInput.value.trim();
        if (notesUrl) window.open(notesUrl, '_blank');
        else showToast("No notes URL provided", true);
    });
    viewDppBtn.addEventListener('click', () => {
        const dppUrl = dppUrlInput.value.trim();
        if (dppUrl) window.open(dppUrl, '_blank');
        else showToast("No DPP URL provided", true);
    });
    shareBtn.addEventListener('click', openShareModal);
    copyShareBtn.addEventListener('click', () => {
        shareLinkInput.select();
        navigator.clipboard.writeText(shareLinkInput.value);
        showToast("Share link copied", false);
    });
    closeShareModal.addEventListener('click', () => shareModal.style.display = 'none');
    
    // Theme toggle
    let isLight = false;
    document.getElementById('themeToggle').addEventListener('click', () => {
        const root = document.documentElement;
        if (!isLight) {
            root.style.setProperty('--bg-dark', '#F1F5F9');
            root.style.setProperty('--bg-darker', '#E2E8F0');
            root.style.setProperty('--bg-card', '#FFFFFF');
            root.style.setProperty('--text-light', '#0F172A');
            root.style.setProperty('--text-muted', '#334155');
            document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
            isLight = true;
        } else {
            root.style.setProperty('--bg-dark', '#0A1128');
            root.style.setProperty('--bg-darker', '#050A1D');
            root.style.setProperty('--bg-card', '#131C3F');
            root.style.setProperty('--text-light', '#FFFFFF');
            root.style.setProperty('--text-muted', '#A0AEC0');
            document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';
            isLight = false;
        }
    });
    
    // Check localstorage for persistent edit
    window.addEventListener('DOMContentLoaded', () => {
        initPlayer();
        if (localStorage.getItem('learnix_edit_mode') === 'true') {
            applyEditMode(true);
        } else {
            applyEditMode(false);
        }
        loadLastSession();
        loadFromUrlParams();    // auto-play shared link params
        
        // additional fix for cloudfront signature: trigger load if url exists
        if (videoUrlInput.value.trim()) {
            setTimeout(() => {
                if (videoUrlInput.value.includes('cloudfront.net')) {
                    showToast("Detected CloudFront HLS stream — initializing player", false);
                    loadStream(videoUrlInput.value);
                }
            }, 800);
        }
    });
    
    // Override any XHR/CORS issues by forcing no-cors mode is not needed, but video.js hls.js handles it.
    window.addEventListener('error', (e) => {
        if (e.message && e.message.includes('HLS')) {
            console.warn("HLS fallback triggered");
        }
    });
</script>
</body>
</html>
